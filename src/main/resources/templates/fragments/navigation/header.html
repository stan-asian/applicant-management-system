<nav
  th:fragment="header()"
  class="grain relative w-full z-50 shadow-lg"
  style="
    background: linear-gradient(135deg, #1e4019 0%, #254f22 55%, #2a5626 100%);
  "
>
  <!-- Top accent bar: ember to flame to ember -->
  <div
    class="absolute top-0 left-0 right-0 h-[3px]"
    style="
      background: linear-gradient(90deg, #a03a13 0%, #f5824a 50%, #a03a13 100%);
    "
  ></div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-[3px]">
    <div class="flex items-center justify-between h-[68px] lg:h-20">
      <!-- ── LOGO ──────────────────────────────────────────── -->
      <a th:href="@{/}" class="flex items-center gap-3 group select-none">
        <!-- Icon: briefcase + person silhouette -->
        <div class="relative w-10 h-10 flex-shrink-0">
          <svg
            viewBox="0 0 40 40"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            class="w-full h-full drop-shadow-md"
          >
            <!-- Briefcase body -->
            <rect
              x="5"
              y="14"
              width="30"
              height="20"
              rx="3.5"
              fill="#A03A13"
              opacity="0.95"
            />
            <!-- Briefcase handle -->
            <path
              d="M14 14v-3a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v3"
              stroke="#EDE4C2"
              stroke-width="2"
              stroke-linecap="round"
              fill="none"
              opacity="0.8"
            />
            <!-- Center clasp line -->
            <rect
              x="5"
              y="22"
              width="30"
              height="2.5"
              rx="1"
              fill="#EDE4C2"
              opacity="0.12"
            />
            <!-- Person icon overlay -->
            <circle cx="20" cy="21" r="3.2" fill="#F5824A" />
            <path
              d="M13.5 31c0-3.59 2.91-6.5 6.5-6.5s6.5 2.91 6.5 6.5"
              fill="#F5824A"
              opacity="0.75"
            />
          </svg>
        </div>

        <!-- Wordmark -->
        <div class="flex flex-col gap-0.5 leading-none">
          <div class="flex items-center gap-2">
            <span
              class="font-display text-cream text-[1.35rem] lg:text-2xl font-bold tracking-tight group-hover:text-flame transition-colors duration-300"
            >
              ApplicaTrack
            </span>
            <span class="badge-pill hidden sm:inline text-flame">AMS</span>
          </div>
          <span
            class="text-cream/40 text-[8px] lg:text-[10px] tracking-[0.12em] uppercase font-body"
          >
            Applicant Management System
          </span>
        </div>
      </a>

      <!-- ── CTA BUTTONS (Desktop) ─────────────────────────── -->
      <div class="hidden md:flex items-center gap-2.5">
        <!-- Log In — ghost/outlined -->

        <a
          th:href="@{/login}"
          class="inline-flex items-center gap-2 px-4 py-[9px] rounded-lg text-cream/85 hover:text-cream text-sm font-medium border border-cream/20 hover:border-cream/45 hover:bg-white/[0.07] transition-all duration-250 active:scale-95"
        >
          <!-- Lock icon -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-[15px] h-[15px] opacity-70"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          Log In
        </a>

        <!-- Create Account — flame filled -->
        <a
          th:href="@{/register}"
          class="btn-cta inline-flex items-center gap-2 px-5 py-[9px] rounded-lg bg-flame hover:bg-ember text-white text-sm font-semibold shadow-md shadow-black/20 hover:shadow-ember/40 transition-all duration-250 active:scale-95"
        >
          <!-- User-plus icon -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-[15px] h-[15px]"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <line x1="19" y1="8" x2="19" y2="14" />
            <line x1="22" y1="11" x2="16" y2="11" />
          </svg>
          Create Account
        </a>
      </div>

      <!-- ── HAMBURGER (Mobile / Tablet) ──────────────────── -->
      <button
        id="menu-toggle"
        aria-label="Open navigation menu"
        aria-expanded="false"
        aria-controls="mobile-menu"
        class="md:hidden flex flex-col justify-center items-center w-10 h-10 gap-[5px] text-cream rounded-lg hover:bg-white/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-flame transition-colors duration-200"
      >
        <span
          id="hb1"
          class="w-[22px] h-[2px] bg-current rounded-full transition-all duration-300 origin-center"
        ></span>
        <span
          id="hb2"
          class="w-[22px] h-[2px] bg-current rounded-full transition-all duration-300"
        ></span>
        <span
          id="hb3"
          class="w-[22px] h-[2px] bg-current rounded-full transition-all duration-300 origin-center"
        ></span>
      </button>
    </div>
  </div>

  <!-- ── MOBILE DROPDOWN MENU ──────────────────────────────── -->
  <div
    id="mobile-menu"
    class="md:hidden hidden animate-fade-down border-t border-white/10"
    style="background: linear-gradient(180deg, #1c3d18 0%, #254f22 100%)"
  >
    <div class="max-w-7xl mx-auto px-4 pt-3 pb-5 space-y-4">
      <!-- Mobile CTA buttons -->
      <a
        th:href="@{/login}"
        class="flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg text-cream text-sm font-medium border border-cream/25 hover:border-cream/45 hover:bg-white/[0.07] transition-all duration-200 active:scale-95"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-4 h-4 opacity-70"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
        Log In
      </a>

      <a
        th:href="@{/register}"
        class="btn-cta flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-flame hover:bg-ember text-white text-sm font-semibold shadow-md shadow-black/20 transition-all duration-200 active:scale-95"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-4 h-4"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <line x1="19" y1="8" x2="19" y2="14" />
          <line x1="22" y1="11" x2="16" y2="11" />
        </svg>
        Create Account
      </a>
    </div>
  </div>
  <!-- END MOBILE MENU -->
</nav>
