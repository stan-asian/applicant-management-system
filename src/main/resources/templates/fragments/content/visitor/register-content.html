<main th:fragment="registerContent()">
  <section
    class="min-h-[89vh] bg-cream flex items-center justify-center px-6 py-8"
  >
    <div
      class="w-full max-w-4xl grid grid-cols-1 lg:grid-cols-[1fr_1.2fr] gap-12 lg:items-center"
    >
      <!-- ═══ LEFT COLUMN ═══ -->
      <div class="flex flex-col gap-5">
        <!-- Heading -->
        <div>
          <div class="inline-flex items-center gap-2 mb-3">
            <span
              class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[11px] font-semibold text-ember uppercase tracking-wider"
              style="
                background: rgba(160, 58, 19, 0.08);
                border: 1px solid rgba(160, 58, 19, 0.18);
              "
            >
              <span
                class="w-1.5 h-1.5 rounded-full bg-flame animate-pulse"
              ></span>
              New account
            </span>
          </div>
          <h1
            class="font-display text-forest text-3xl lg:text-5xl leading-tight mb-2"
          >
            Create your account
          </h1>
          <p class="text-sm text-forest opacity-60 leading-relaxed">
            Fill in your details to get started with ApplicantMS.
          </p>
        </div>

        <!-- Info cards -->
        <div class="flex flex-col gap-3">
          <div
            class="flex items-start gap-3 rounded-xl px-4 py-3.5"
            style="
              background: rgba(37, 79, 34, 0.06);
              border: 1px solid rgba(37, 79, 34, 0.12);
            "
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-4 h-4 text-forest mt-0.5 flex-shrink-0"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
            <p
              class="text-xs leading-relaxed"
              style="color: rgba(37, 79, 34, 0.7)"
            >
              Your information is protected and never shared with third parties.
            </p>
          </div>
          <div
            class="flex items-start gap-3 rounded-xl px-4 py-3.5"
            style="
              background: rgba(37, 79, 34, 0.04);
              border: 1px solid rgba(37, 79, 34, 0.1);
            "
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-4 h-4 text-forest mt-0.5 flex-shrink-0"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 6 12 12 16 14" />
            </svg>
            <p
              class="text-xs leading-relaxed"
              style="color: rgba(37, 79, 34, 0.7)"
            >
              Setup takes less than a minute. Your account is ready instantly.
            </p>
          </div>
        </div>

        <!-- Sign in link -->
        <p class="text-sm" style="color: rgba(37, 79, 34, 0.55)">
          Already have an account?
          <a
            th:href="@{/login}"
            class="font-semibold text-ember hover:text-flame transition-colors duration-200 ml-1"
          >
            Sign in here
          </a>
        </p>
      </div>

      <!-- ═══ RIGHT COLUMN: Form card ═══ -->
      <div
        class="bg-cream rounded-2xl p-8 border"
        style="
          border-color: rgba(37, 79, 34, 0.1);
          box-shadow: 0 4px 24px rgba(37, 79, 34, 0.06);
        "
      >
        <!-- TOASTS -->
        <div
          th:if="${successMessage != null}"
          id="toast-success"
          class="fixed top-4 left-1/2 -translate-x-1/2 z-50 flex items-center gap-3 px-5 py-3.5 rounded-2xl border border-cream text-sm font-semibold bg-forest text-cream shadow-lg opacity-0 -translate-y-2.5 transition-all duration-300 ease-out whitespace-nowrap"
        >
          <span
            class="flex items-center justify-center w-6 h-6 rounded-full bg-white/15 flex-shrink-0"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-3.5 h-3.5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="3"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="20 6 9 17 4 12" />
            </svg>
          </span>
          <span th:text="${successMessage}"></span>
          <button
            type="button"
            onclick="document.getElementById('toast-success').remove()"
            class="ml-2 flex items-center justify-center w-5 h-5 rounded-full text-cream/50 hover:text-cream/90 hover:bg-white/10 transition-colors duration-150 flex-shrink-0"
            aria-label="Dismiss"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-3 h-3"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="3"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>

        <div
          th:if="${errorMessage != null}"
          id="toast-error"
          class="fixed top-4 left-1/2 -translate-x-1/2 z-50 flex items-center gap-3 px-5 py-3.5 rounded-2xl text-sm font-semibold border border-cream bg-ember text-cream shadow-lg opacity-0 -translate-y-2.5 transition-all duration-300 ease-out whitespace-nowrap"
        >
          <span
            class="flex items-center justify-center w-6 h-6 rounded-full bg-white/15 flex-shrink-0"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-3.5 h-3.5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="3"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="12" />
              <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
          </span>
          <span th:text="${errorMessage}"></span>
          <button
            type="button"
            onclick="document.getElementById('toast-error').remove()"
            class="ml-2 flex items-center justify-center w-5 h-5 rounded-full text-cream/50 hover:text-cream/90 hover:bg-white/10 transition-colors duration-150 flex-shrink-0"
            aria-label="Dismiss"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-3 h-3"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="3"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>

        <form
          th:action="@{/visitor/register}"
          th:object="${userDTO}"
          method="post"
          class="flex flex-col gap-4"
          id="registerForm"
          novalidate
        >
          <input
            type="hidden"
            th:name="${_csrf.parameterName}"
            th:value="${_csrf.token}"
          />

          <!-- First + Last Name -->
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-3">
            <div class="flex flex-col gap-1.5">
              <label
                for="firstName"
                class="text-xs font-semibold uppercase tracking-wider"
                style="color: rgba(37, 79, 34, 0.65)"
                >First Name</label
              >
              <input
                type="text"
                id="firstName"
                th:field="*{firstName}"
                name="firstName"
                autocomplete="given-name"
                placeholder="Juan"
                required
                class="w-full px-3.5 py-2.5 rounded-xl text-sm font-medium text-forest placeholder:text-ember/50 bg-cream transition-all duration-200 outline-none"
                style="
                  border: 1px solid rgba(37, 79, 34, 0.2);
                  box-shadow: 0 1px 4px rgba(37, 79, 34, 0.06);
                "
                onfocus="
                  this.style.borderColor = 'rgba(37,79,34,0.5)';
                  this.style.boxShadow = '0 0 0 3px rgba(37,79,34,0.08)';
                "
                onblur="
                  this.style.borderColor = 'rgba(37,79,34,0.2)';
                  this.style.boxShadow = '0 1px 4px rgba(37,79,34,0.06)';
                "
              />
              <p
                th:if="${#fields.hasErrors('firstName')}"
                th:errors="*{firstName}"
                class="text-red-500 text-[11px] mt-0.5"
              ></p>
            </div>
            <div class="flex flex-col gap-1.5">
              <label
                for="lastName"
                class="text-xs font-semibold uppercase tracking-wider"
                style="color: rgba(37, 79, 34, 0.65)"
                >Last Name</label
              >
              <input
                type="text"
                id="lastName"
                th:field="*{lastName}"
                name="lastName"
                autocomplete="family-name"
                placeholder="dela Cruz"
                required
                class="w-full px-3.5 py-2.5 rounded-xl text-sm font-medium text-forest placeholder:text-ember/50 bg-cream transition-all duration-200 outline-none"
                style="
                  border: 1px solid rgba(37, 79, 34, 0.2);
                  box-shadow: 0 1px 4px rgba(37, 79, 34, 0.06);
                "
                onfocus="
                  this.style.borderColor = 'rgba(37,79,34,0.5)';
                  this.style.boxShadow = '0 0 0 3px rgba(37,79,34,0.08)';
                "
                onblur="
                  this.style.borderColor = 'rgba(37,79,34,0.2)';
                  this.style.boxShadow = '0 1px 4px rgba(37,79,34,0.06)';
                "
              />
              <p
                th:if="${#fields.hasErrors('lastName')}"
                th:errors="*{lastName}"
                class="text-red-500 text-[11px] mt-0.5"
              ></p>
            </div>
          </div>

          <!-- Email -->
          <div class="flex flex-col gap-1.5">
            <label
              for="email"
              class="text-xs font-semibold uppercase tracking-wider"
              style="color: rgba(37, 79, 34, 0.65)"
              >Email Address</label
            >
            <div class="relative">
              <span
                class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-4 h-4"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  style="color: rgba(37, 79, 34, 0.4)"
                >
                  <path
                    d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                  />
                  <polyline points="22,6 12,13 2,6" />
                </svg>
              </span>
              <input
                type="email"
                id="email"
                th:field="*{email}"
                name="email"
                autocomplete="email"
                placeholder="juan@example.com"
                required
                class="w-full pl-10 pr-4 py-2.5 rounded-xl text-sm font-medium text-forest placeholder:text-ember/50 bg-cream transition-all duration-200 outline-none"
                style="
                  border: 1px solid rgba(37, 79, 34, 0.2);
                  box-shadow: 0 1px 4px rgba(37, 79, 34, 0.06);
                "
                onfocus="
                  this.style.borderColor = 'rgba(37,79,34,0.5)';
                  this.style.boxShadow = '0 0 0 3px rgba(37,79,34,0.08)';
                "
                onblur="
                  this.style.borderColor = 'rgba(37,79,34,0.2)';
                  this.style.boxShadow = '0 1px 4px rgba(37,79,34,0.06)';
                "
              />
            </div>
            <p
              th:if="${#fields.hasErrors('email')}"
              th:errors="*{email}"
              class="text-red-500 text-[11px] mt-0.5"
            ></p>
          </div>

          <!-- Password -->
          <div class="flex flex-col gap-1.5">
            <label
              for="registerPassword"
              class="text-xs font-semibold uppercase tracking-wider"
              style="color: rgba(37, 79, 34, 0.65)"
              >Password</label
            >
            <div class="relative">
              <span
                class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-4 h-4"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  style="color: rgba(37, 79, 34, 0.4)"
                >
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
              </span>
              <input
                type="password"
                id="registerPassword"
                th:field="*{password}"
                name="password"
                autocomplete="new-password"
                placeholder="Min. 8 characters"
                required
                minlength="8"
                class="w-full pl-10 pr-11 py-2.5 rounded-xl text-sm font-medium text-forest placeholder:text-ember/50 bg-cream transition-all duration-200 outline-none"
                style="
                  border: 1px solid rgba(37, 79, 34, 0.2);
                  box-shadow: 0 1px 4px rgba(37, 79, 34, 0.06);
                "
                onfocus="
                  this.style.borderColor = 'rgba(37,79,34,0.5)';
                  this.style.boxShadow = '0 0 0 3px rgba(37,79,34,0.08)';
                "
                onblur="
                  this.style.borderColor = 'rgba(37,79,34,0.2)';
                  this.style.boxShadow = '0 1px 4px rgba(37,79,34,0.06)';
                "
              />
              <button
                type="button"
                id="toggleRegisterPasswordBtn"
                class="absolute inset-y-0 right-0 flex items-center pr-3.5 transition-opacity duration-150 hover:opacity-70"
                style="color: rgba(37, 79, 34, 0.4)"
                tabindex="-1"
                aria-label="Toggle password visibility"
              >
                <svg
                  id="regEyeIcon"
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-4 h-4"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
            <p
              th:if="${#fields.hasErrors('password')}"
              th:errors="*{password}"
              class="text-red-500 text-[11px] mt-0.5"
            ></p>
            <div class="flex gap-1 mt-1" id="strengthBars">
              <div
                class="h-1 flex-1 rounded-full transition-all duration-300"
                id="bar1"
                style="background: rgba(37, 79, 34, 0.12)"
              ></div>
              <div
                class="h-1 flex-1 rounded-full transition-all duration-300"
                id="bar2"
                style="background: rgba(37, 79, 34, 0.12)"
              ></div>
              <div
                class="h-1 flex-1 rounded-full transition-all duration-300"
                id="bar3"
                style="background: rgba(37, 79, 34, 0.12)"
              ></div>
              <div
                class="h-1 flex-1 rounded-full transition-all duration-300"
                id="bar4"
                style="background: rgba(37, 79, 34, 0.12)"
              ></div>
            </div>
            <p
              class="text-[11px]"
              id="strengthLabel"
              style="color: rgba(37, 79, 34, 0.4); min-height: 1rem"
            ></p>
          </div>

          <!-- Confirm Password -->
          <div class="flex flex-col gap-1.5">
            <label
              for="confirmPassword"
              class="text-xs font-semibold uppercase tracking-wider"
              style="color: rgba(37, 79, 34, 0.65)"
              >Confirm Password</label
            >
            <div class="relative">
              <span
                class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-4 h-4"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  style="color: rgba(37, 79, 34, 0.4)"
                >
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                </svg>
              </span>
              <input
                type="password"
                id="confirmPassword"
                th:field="*{confirmPassword}"
                name="confirmPassword"
                autocomplete="new-password"
                placeholder="Re-enter your password"
                required
                class="w-full pl-10 pr-11 py-2.5 rounded-xl text-sm font-medium text-forest placeholder:text-ember/50 bg-cream transition-all duration-200 outline-none"
                style="
                  border: 1px solid rgba(37, 79, 34, 0.2);
                  box-shadow: 0 1px 4px rgba(37, 79, 34, 0.06);
                "
                onfocus="
                  this.style.borderColor = 'rgba(37,79,34,0.5)';
                  this.style.boxShadow = '0 0 0 3px rgba(37,79,34,0.08)';
                "
                onblur="
                  this.style.borderColor = 'rgba(37,79,34,0.2)';
                  this.style.boxShadow = '0 1px 4px rgba(37,79,34,0.06)';
                "
              />
              <button
                type="button"
                id="toggleConfirmPasswordBtn"
                class="absolute inset-y-0 right-0 flex items-center pr-3.5 transition-opacity duration-150 hover:opacity-70"
                style="color: rgba(37, 79, 34, 0.4)"
                tabindex="-1"
                aria-label="Toggle confirm password visibility"
              >
                <svg
                  id="confirmEyeIcon"
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-4 h-4"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
            <p
              th:if="${#fields.hasErrors('confirmPassword')}"
              th:errors="*{confirmPassword}"
              class="text-red-500 text-[11px] mt-0.5"
            ></p>
            <p class="text-[11px]" id="matchHint" style="min-height: 1rem"></p>
          </div>

          <!-- Submit -->
          <button
            type="submit"
            id="registerSubmitBtn"
            class="w-full flex items-center justify-center gap-2 text-cream bg-ember px-5 py-3 rounded-xl font-semibold text-sm transition-all duration-200 hover:-translate-y-0.5 active:translate-y-0 mt-1"
            onmouseover="this.style.background = 'rgba(37,79,34,0.88)'"
            onmouseout="this.style.background = 'rgba(37,79,34,1)'"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-4 h-4"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="8.5" cy="7" r="4" />
              <line x1="20" y1="8" x2="20" y2="14" />
              <line x1="23" y1="11" x2="17" y2="11" />
            </svg>
            Create Account
          </button>
        </form>
      </div>
    </div>
  </section>
</main>
