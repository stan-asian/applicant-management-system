<main th:fragment="loginContent">
  <section
    class="min-h-[76vh] bg-cream flex items-center justify-center px-4 py-16"
  >
    <div class="w-full max-w-md flex flex-col gap-5">
      <!-- Page heading -->
      <div class="flex flex-col gap-1">
        <div class="inline-flex items-center gap-2">
          <span
            class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[11px] font-semibold text-ember uppercase tracking-wider"
            style="
              background: rgba(160, 58, 19, 0.08);
              border: 1px solid rgba(160, 58, 19, 0.18);
            "
          >
            <span
              class="w-1.5 h-1.5 rounded-full bg-flame animate-pulse"
            ></span>
            Welcome back
          </span>
        </div>
        <h1 class="font-display text-forest text-5xl lg:text-7xl">
          Sign in to your account
        </h1>
        <p class="text-sm mt-1 opacity-60 text-forest">
          Enter your admin credentials to access the portal.
        </p>
      </div>

      <!-- Admin Login Form -->
      <form th:action="@{/login}" method="post" class="flex flex-col gap-4">
        <!-- User Email -->
        <div class="flex flex-col gap-1.5">
          <label
            for="email"
            class="text-xs font-semibold uppercase tracking-wider"
            style="color: rgba(37, 79, 34, 0.65)"
          >
            Email
          </label>
          <div class="relative">
            <span
              class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-4 h-4"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                style="color: rgba(37, 79, 34, 0.4)"
              >
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
            </span>
            <input
              type="text"
              id="email"
              name="username"
              autocomplete="username"
              placeholder="e.g. johndoe@gmail.com"
              required
              class="w-full pl-10 pr-4 py-3 rounded-xl text-sm font-medium text-forest placeholder:text-ember/50 bg-cream transition-all duration-200 outline-none"
              style="
                border: 1px solid rgba(37, 79, 34, 0.2);
                box-shadow: 0 1px 4px rgba(37, 79, 34, 0.06);
              "
              onfocus="
                this.style.borderColor = 'rgba(37,79,34,0.5)';
                this.style.boxShadow = '0 0 0 3px rgba(37,79,34,0.08)';
              "
              onblur="
                this.style.borderColor = 'rgba(37,79,34,0.2)';
                this.style.boxShadow = '0 1px 4px rgba(37,79,34,0.06)';
              "
            />
          </div>
        </div>

        <!-- Password -->
        <div class="flex flex-col gap-1.5">
          <label
            for="password"
            class="text-xs font-semibold uppercase tracking-wider"
            style="color: rgba(37, 79, 34, 0.65)"
          >
            Password
          </label>
          <div class="relative">
            <span
              class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-4 h-4"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                style="color: rgba(37, 79, 34, 0.4)"
              >
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
            </span>
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="current-password"
              placeholder="Enter your password"
              required
              class="w-full pl-10 pr-11 py-3 rounded-xl text-sm font-medium text-forest placeholder:text-ember/50 bg-cream transition-all duration-200 outline-none"
              style="
                border: 1px solid rgba(37, 79, 34, 0.2);
                box-shadow: 0 1px 4px rgba(37, 79, 34, 0.06);
              "
              onfocus="
                this.style.borderColor = 'rgba(37,79,34,0.5)';
                this.style.boxShadow = '0 0 0 3px rgba(37,79,34,0.08)';
              "
              onblur="
                this.style.borderColor = 'rgba(37,79,34,0.2)';
                this.style.boxShadow = '0 1px 4px rgba(37,79,34,0.06)';
              "
            />
            <button
              type="button"
              id="togglePasswordBtn"
              class="absolute inset-y-0 right-0 flex items-center pr-3.5 transition-opacity duration-150 hover:opacity-70"
              style="color: rgba(37, 79, 34, 0.4)"
              tabindex="-1"
              aria-label="Toggle password visibility"
            >
              <svg
                id="eyeIcon"
                xmlns="http://www.w3.org/2000/svg"
                class="w-4 h-4"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>

          <!-- Forgot password trigger -->
          <div class="flex justify-end mt-0.5">
            <button
              type="button"
              id="forgotPasswordBtn"
              class="text-xs font-semibold text-ember hover:text-flame transition-colors duration-200"
            >
              Forgot password?
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="w-full flex items-center justify-center gap-2 px-5 py-3.5 rounded-xl font-semibold text-sm transition-all duration-200 hover:-translate-y-0.5 active:translate-y-0"
          style="
            background: rgba(37, 79, 34, 1);
            color: #f5f0e8;
            box-shadow: 0 2px 8px rgba(37, 79, 34, 0.25);
          "
          onmouseover="this.style.background = 'rgba(37,79,34,0.88)'"
          onmouseout="this.style.background = 'rgba(37,79,34,1)'"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-4 h-4"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
            <polyline points="10 17 15 12 10 7" />
            <line x1="15" y1="12" x2="3" y2="12" />
          </svg>
          Sign In
        </button>
      </form>

      <!-- Forgot Password Panel -->
      <div
        id="forgotPasswordPanel"
        style="
          display: grid;
          grid-template-rows: 0fr;
          transition:
            grid-template-rows 0.35s cubic-bezier(0.4, 0, 0.2, 1),
            opacity 0.3s ease;
          opacity: 0;
          overflow: hidden;
        "
      >
        <div style="overflow: hidden; min-height: 0">
          <div
            class="rounded-xl px-5 py-4 flex flex-col gap-4"
            style="
              border: 1px solid rgba(160, 58, 19, 0.2);
              background: rgba(160, 58, 19, 0.04);
            "
          >
            <!-- Panel header -->
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-2">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-4 h-4 text-ember flex-shrink-0"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                  <path d="M7 11V7a5 5 0 0 1 9.9-1" />
                </svg>
                <span class="text-sm font-bold text-ember"
                  >Reset your password</span
                >
              </div>
              <button
                type="button"
                id="closeForgotPasswordBtn"
                class="flex items-center justify-center w-6 h-6 rounded-full transition-colors duration-150 hover:bg-black/5"
                style="color: rgba(160, 58, 19, 0.5)"
                aria-label="Close"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-3.5 h-3.5"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <line x1="18" y1="6" x2="6" y2="18" />
                  <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
              </button>
            </div>

            <p
              class="text-xs leading-relaxed"
              style="color: rgba(37, 79, 34, 0.6)"
            >
              Enter the email address linked to your admin account. We'll send
              you a reset link.
            </p>

            <!-- Reset form -->
            <form
              action="/forgot-password"
              method="post"
              class="flex flex-col gap-3"
            >
              <div class="relative">
                <span
                  class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="w-4 h-4"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    style="color: rgba(160, 58, 19, 0.45)"
                  >
                    <path
                      d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                    />
                    <polyline points="22,6 12,13 2,6" />
                  </svg>
                </span>
                <input
                  type="email"
                  id="resetEmail"
                  name="email"
                  placeholder="admin@example.com"
                  required
                  class="w-full pl-10 pr-4 py-3 rounded-xl text-sm font-medium bg-cream transition-all duration-200 outline-none"
                  style="
                    border: 1px solid rgba(160, 58, 19, 0.22);
                    color: rgba(37, 79, 34, 1);
                    box-shadow: 0 1px 3px rgba(160, 58, 19, 0.06);
                  "
                  onfocus="
                    this.style.borderColor = 'rgba(160,58,19,0.5)';
                    this.style.boxShadow = '0 0 0 3px rgba(160,58,19,0.08)';
                  "
                  onblur="
                    this.style.borderColor = 'rgba(160,58,19,0.22)';
                    this.style.boxShadow = '0 1px 3px rgba(160,58,19,0.06)';
                  "
                />
              </div>

              <button
                type="submit"
                class="w-full flex items-center justify-center gap-2 px-5 py-3 rounded-xl text-sm font-semibold transition-all duration-200 hover:-translate-y-0.5 active:translate-y-0"
                style="
                  background: rgba(160, 58, 19, 0.9);
                  color: #f5f0e8;
                  box-shadow: 0 2px 6px rgba(160, 58, 19, 0.2);
                "
                onmouseover="this.style.background = 'rgba(160,58,19,1)'"
                onmouseout="this.style.background = 'rgba(160,58,19,0.9)'"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-4 h-4"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <line x1="22" y1="2" x2="11" y2="13" />
                  <polygon points="22 2 15 22 11 13 2 9 22 2" />
                </svg>
                Send Reset Link
              </button>
            </form>
          </div>
        </div>
      </div>

      <!-- Don't have an account -->
      <p class="text-center text-sm" style="color: rgba(37, 79, 34, 0.55)">
        Don't have an account?
        <a
          href="/register"
          class="font-semibold text-ember hover:text-flame transition-colors duration-200 ml-1"
        >
          Create one now
        </a>
      </p>
    </div>
  </section>
</main>
