<head th:fragment="head(pageName)">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${pageName}">Document</title>

  <!-- FONT AWESOME -->
  <script

  <!-- TAILWIND CDN (Reminder: This must be place before Tailwind Config Script) -->

  <script th:src="@{/js/tailwind.js}"></script>
</head>
